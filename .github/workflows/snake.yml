name: Génère la snake animation

on:
  schedule:
    - cron: "0 2 * * *" # tous les jours à 2h du matin
  workflow_dispatch: {} # permet de la lancer manuellement depuis l'onglet Actions
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Génère la snake animation SVG
        uses: Platane/snk@v3
        with:
          github_user_name: mmr45
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publie sur la branche "output"
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
